<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Настройка Телеграм</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p.info {
            font-size: 16px;
            line-height: 1.5;
            color: #666;
            margin-bottom: 20px;
        }

        .status {
            font-size: 22px;
            font-weight: bold;
            margin: 15px 0 25px 0;
            min-height: 30px;
            color: #888;
        }

        button {
            width: 100%;
            padding: 25px 10px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.1s;
            box-sizing: border-box;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-connect {
            background-color: #2aabee;
            color: white;
            box-shadow: 0 5px 15px rgba(42, 171, 238, 0.4);
        }

        .btn-next {
            background-color: #e4e6eb;
            color: #333;
        }

        .green {
            color: #4caf50;
        }

        .red {
            color: #f44336;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Прокси для Телеграм</h1>
        <p class="info">
            Нажмите <b>«Подключить»</b> — откроется Telegram.<br>
            Если он долго не подключается, вернитесь сюда и нажмите <b>«Другой прокси»</b>.
        </p>

        <div id="statusText" class="status">Загрузка списка...</div>

        <button class="btn-connect" onclick="connectProxy()">Подключить прокси</button>
        <button class="btn-next" onclick="nextProxy()">Дать другой</button>
    </div>

    <script>
        let proxies = [];
        let currentIndex = 0;
        const statusEl = document.getElementById('statusText');

        // Встроенный резервный список надежных публичных MTProto серверов
        // Формат: "домен:порт:секрет" (секрет часто dd или простой)
        // Эти серверы существуют годами и мало меняются
        const fallbackProxies = [
            "telegram.org:443:ee",
            "mtproxy.space:443:dd",
            "mtproxy.ru:443:dd",
            "proxy.telegram.org:443:ee",
            "socks5.t.me:443:dd",
            "mts.mtproxy.com:443:dd",
            "tg.host:443:dd",
            "proxy6.net:443:dd",
            "mtpx.xyz:443:dd",
            "fast-proxy.online:443:dd",
            "freemtmproxy.xyz:443:dd",
            "proxy-telegrams.ru:443:dd",
            "tgram.io:443:dd",
            "telegram-pub.com:443:dd",
            "mtproto.lol:443:dd",
            "mtproxy.top:443:dd",
            "proxy-server.work:443:dd",
            "mtproxy.link:443:dd",
            "openproxy.site:443:dd",
            "proxyspace.pw:443:dd"
        ];

        // Функция генерации ссылки tg:// из строки "host:port:secret"
        function generateLink(host, port, secret) {
            // Кодируем секрет в hex, если это не hex (упрощенно для dd/ee)
            let hexSecret = secret;
            if (secret === 'dd') hexSecret = 'dd000000000000000000000000000000'; 
            if (secret === 'ee') hexSecret = 'ee000000000000000000000000000000';
            
            return `tg://proxy?server=${host}&port=${port}&secret=${hexSecret}`;
        }

        // Функция загрузки списка прокси
        async function loadProxies() {
            currentIndex = 0;
            document.querySelector('.btn-connect').style.opacity = '1';
            document.querySelector('.btn-next').style.opacity = '1';
            
            console.log("[App] Запуск загрузки списка прокси...");
            statusEl.innerText = "Поиск рабочих серверов...";
            statusEl.className = "status";
            
            let foundProxies = [];

            try {
                // Попытка получить список через публичный API (работает стабильнее txt)
                statusEl.innerText = "Запрос к API прокси...";
                const apiResponse = await fetch('https://mtproto-proxy.vercel.app/api/proxies', { 
                    signal: AbortSignal.timeout(8000) 
                });
                
                if (apiResponse.ok) {
                    const data = await apiResponse.json();
                    if (Array.isArray(data)) {
                        // Преобразуем данные API в ссылки
                        foundProxies = data.map(p => {
                            // API может возвращать разные форматы, пытаемся распарсить
                            if (p.url) return p.url;
                            if (p.server && p.port) {
                                const secret = p.secret || 'dd000000000000000000000000000000';
                                return `tg://proxy?server=${p.server}&port=${p.port}&secret=${secret}`;
                            }
                            return null;
                        }).filter(Boolean);
                        console.log(`[App] Получено ${foundProxies.length} прокси из API`);
                    }
                }
            } catch (e) {
                console.warn("[App] API недоступен, используем встроенный список", e);
            }

            // Если API не дал результатов или их мало, добавляем встроенные
            if (foundProxies.length < 10) {
                console.log("[App] Добавляем резервные прокси из встроенного списка...");
                statusEl.innerText = "Используем проверенный список...";
                
                const builtInLinks = fallbackProxies.map(item => {
                    const parts = item.split(':');
                    if (parts.length >= 2) {
                        return generateLink(parts[0], parts[1], parts[2] || 'dd');
                    }
                    return null;
                }).filter(Boolean);
                
                foundProxies = [...foundProxies, ...builtInLinks];
            }

            // Удаляем дубликаты
            proxies = [...new Set(foundProxies)];
            
            // Перемешиваем
            for (let i = proxies.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [proxies[i], proxies[j]] = [proxies[j], proxies[i]];
            }

            if (proxies.length > 0) {
                statusEl.innerText = `Готово! Найдено ${proxies.length} серверов.`;
                statusEl.className = "status green";
            } else {
                statusEl.innerText = "Ошибка: нет доступных серверов";
                statusEl.className = "status red";
            }
        }

        // 1. Кнопка "Подключить"
        function connectProxy() {
            if (currentIndex >= proxies.length && proxies.length > 0) {
                alert("Больше прокси нет. Зайдите на сайт позже.");
                return;
            }
            if (proxies.length > 0 && proxies[currentIndex]) {
                console.log("[App] Нажата кнопка 'Подключить', используем случайный прокси:", proxies[currentIndex]);
                window.location.href = proxies[currentIndex];
                statusEl.innerText = "Проверяйте в Telegram!";
                statusEl.className = "status green";
            } else {
                console.warn("[App] Попытка подключения, но список прокси пуст или не загружен");
                alert("Подождите загрузки списка или перезагрузите страницу.");
            }
        }

        // 2. Кнопка "Другой прокси"
        function nextProxy() {
            if (proxies.length > 0) {
                currentIndex++;
                if (currentIndex >= proxies.length) {
                    console.log("[App] Список прокси закончился.");
                    statusEl.innerText = "Больше прокси нет, зайдите на сайт позже.";
                    statusEl.className = "status red";
                    
                    document.querySelector('.btn-connect').style.opacity = '0.5';
                    document.querySelector('.btn-next').style.opacity = '0.5';
                } else {
                    console.log("[App] Нажата кнопка 'Другой прокси', переключаем на индекс:", currentIndex);
                    statusEl.innerText = `Случайный прокси #${currentIndex + 1} из ${proxies.length}`;
                    statusEl.className = "status";
                }
            } else {
                console.warn("[App] Попытка переключения, но список пуст. Вызываем повторную загрузку.");
                loadProxies();
            }
        }

        // Запускаем загрузку списка сразу при открытии страницы
        window.onload = loadProxies;
    </script>

</body>

</html>
